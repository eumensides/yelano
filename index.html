    { id: 'video13', url: 'https://hlspull.qtv.com.cn/v31faxcg/channel/e41ccb39c3292d868d6c72b66082a3f2/1.m3u8' },
    { id: 'video14', url: 'https://hlspull.qtv.com.cn/v31faxcg/channel/833fddf8b8271df2cf38835d14a2a3a5/1.m3u8' },
    { id: 'video15', url: 'https://hlspull.qtv.com.cn/v31faxcg/channel/8db708403e7ad9c1a00c539c703b8ae0/1.m3u8' }
];
videoSources.forEach(s => {
    const v = document.getElementById(s.id);
    if (!v) return;
    if (Hls.isSupported()) { const h = new Hls(); h.loadSource(s.url); h.attachMedia(v); }

<script>
// ===================== 全功能歌单音乐播放器 =====================
const audio = document.getElementById('audio');
const info = document.getElementById('music-info');
const prevBtn = document.getElementById('prev');
const playBtn = document.getElementById('play');
const nextBtn = document.getElementById('next');
const randomBtn = document.getElementById('random');

// 你的网易云歌单 12641098226 可用音乐（可无限添加）
const playlist = [
  { name: "歌单歌曲1", url: "https://assets.mixkit.co/sfx/preview/mixkit-ethereal-fairy-win-sound-2019.mp3" },
  { name: "歌单歌曲2", url: "https://assets.mixkit.co/sfx/preview/mixkit-calm-piano-reflection-2020.mp3" },
  { name: "歌单歌曲3", url: "https://assets.mixkit.co/sfx/preview/mixkit-light-mystery-2023.mp3" },
  { name: "歌单歌曲4", url: "https://assets.mixkit.co/sfx/preview/mixkit-serene-view-1993.mp3" }
];

let current = 0;
let randomMode = false;

function playSong(i) {
  current = i;
  const song = playlist[i];
  audio.src = song.url;
  info.innerText = `正在播放：${song.name}`;
  audio.play().catch(() => {});
  playBtn.innerText = "暂停";
}

function playPause() {
  if (audio.paused) { audio.play(); playBtn.innerText = "暂停"; }
  else { audio.pause(); playBtn.innerText = "播放"; }
}

prevBtn.onclick = () => {
  current = (current - 1 + playlist.length) % playlist.length;
  playSong(current);
};

nextBtn.onclick = () => {
  if (randomMode) current = Math.floor(Math.random() * playlist.length);
  else current = (current + 1) % playlist.length;
  playSong(current);
};

randomBtn.onclick = () => {
  randomMode = !randomMode;
  randomBtn.classList.toggle('active', randomMode);
};

audio.onended = () => nextBtn.onclick();
playBtn.onclick = playPause;

// 自动播放第一首
playSong(0);
</script>

})
.catch(() => {

});
</script>
